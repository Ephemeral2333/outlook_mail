<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>邮件收件箱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="/mail.css">
</head>
<body>
  <div class="app">

    <header class="topbar">
      <div class="topbar__brand">
        <svg class="topbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 7l10 6 10-6"/>
        </svg>
        <span class="topbar__title">收件箱</span>
      </div>
      <div class="topbar__right">
        <span id="mailboxEmail" class="topbar__email"></span>
        <button id="refreshBtn" class="btn btn--primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
            <path d="M21 3v5h-5"/>
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
            <path d="M3 21v-5h5"/>
          </svg>
          刷新
        </button>
      </div>
    </header>

    <div class="layout">

      <!-- 左侧列表区 -->
      <div class="list-col">
        <div id="statsBar" class="stats-bar" style="display:none">
          <div class="stat">
            <span class="stat__num" id="totalCount">0</span>
            <span class="stat__label">封邮件</span>
          </div>
          <div class="stat">
            <span class="stat__num" id="unreadCount">0</span>
            <span class="stat__label">未读</span>
          </div>
        </div>

        <div id="stateCard" class="state-card">
          <div class="state-card__icon">
            <svg viewBox="0 0 48 48" fill="none">
              <circle cx="24" cy="24" r="22" stroke="#e8f0fe" stroke-width="2" fill="#f0f4ff"/>
              <path d="M8 17l16 11 16-11" stroke="#4a90e2" stroke-width="2" stroke-linecap="round"/>
              <rect x="8" y="14" width="32" height="22" rx="3" stroke="#4a90e2" stroke-width="2" fill="none"/>
            </svg>
          </div>
          <p id="stateTitle" class="state-card__title">正在加载邮件…</p>
          <p id="stateDesc" class="state-card__desc">请稍候</p>
        </div>

        <ul id="mailList" class="mail-list"></ul>
      </div>

      <!-- 右侧详情抽屉 -->
      <aside id="detailPanel" class="detail-panel">
        <div class="detail-panel__inner">
          <div class="detail-toolbar">
            <button id="closeDetail" class="btn-icon" title="关闭">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6 6 18M6 6l12 12"/>
              </svg>
            </button>
          </div>
          <div id="detailContent" class="detail-content">
            <div class="detail-loading">
              <div class="spinner"></div>
              <p>加载中…</p>
            </div>
          </div>
        </div>
      </aside>

    </div>
  </div>

  <!-- 遮罩层（移动端） -->
  <div id="overlay" class="overlay"></div>

  <script src="/mail-simple.js"></script>
</body>
</html>
